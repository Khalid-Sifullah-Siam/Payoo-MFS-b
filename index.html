<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- Tailwind + DaisyUi CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- Font Awesome CDN Link -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


<!-- Google Font Link -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


<style>
    *{
        font-family: "Outfit", sans-serif;
    }
</style>


</head>
<body class="max-w-md mx-auto py-48 bg-base-200 min-h-screen">
    
    <!-- Login section -->
    <section class="grid gap-8">
        <img src="./assets/Logo-full.png" alt="" srcset="" class="mx-auto">

        <div class="bg-white w-11/12 mx-auto rounded-3xl  p-8">
            <fieldset class="fieldset space-y-4">
 

  <label class="label font-medium text-neutral">Mobile Number</label>
  <input id="mobile-number" type="text" class="input bg-base-200 rounded-full border-none" placeholder="Enter your number" value="12345678901" minlength="11" maxlength="11"/>

  <label class="label font-medium text-neutral">4 Digit Pin</label>
  <input id="4-digit-pin" type="text" class="input bg-base-200 rounded-full border-none" placeholder="Enter 4 Digit Pin" />


<button class="btn btn-primary text-lg text-white rounded-full" id="login-btn">Login</button>
</fieldset>
        </div>
    </section>

    <script src="script/login.js"></script>
</body>
</html>
